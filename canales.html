<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Canales de Televisión en Vivo optimizado para Smart TV. Navegación fluida mediante control remoto y D-pad.">
    <title>GrunTV - Canales de TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js para soportar streams de video .m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

    <div class="tv-app-container">

        <!-- Botonera y Reloj Flotante Global (Encima de todo en la esquina derecha) -->
        <div class="channels-page-header" id="header-status-global">
            <button class="btn-fullscreen focusable" id="btn-fullscreen-toggle" tabindex="0" title="Alternar Menú / Pantalla Completa">⛶</button>
            <button class="btn-audio-split focusable" id="btn-audio-split" tabindex="0" title="Audio Dividido (Auriculares L/R)">🎧</button>
            <div class="tv-clock" id="system-clock">00:00</div>
        </div>

        <!-- ── BARRA LATERAL IZQUIERDA: LISTADO DE CANALES (320px de ancho) ── -->
        <aside class="tv-sidebar-channels" id="tv-sidebar-channels">
            <div class="header-top-bar">
                <div class="tv-brand">
                    <span class="brand-glow"></span>
                    <span class="brand-title">GrunTV</span>
                    <span class="brand-subtitle">IPTV 24/7</span>
                </div>
            </div>

            <!-- Botón de regreso a eventos de fútbol -->
            <a href="index.html" class="tv-channel-item-row focusable" id="btn-goto-events" tabindex="0" style="background: rgba(255, 140, 0, 0.1); border-color: rgba(255, 140, 0, 0.25); text-decoration: none; justify-content: center; height: auto; padding: 12px 14px;">
                <span class="channel-name-txt" style="text-align: center; color: var(--primary);">⚽ Volver a Eventos</span>
            </a>

            <!-- Contenedor vertical de canales con scroll vertical -->
            <div class="tv-channels-vertical-list" id="canales-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p style="font-size:11px;margin-top:5px">Cargando canales...</p>
                </div>
            </div>
        </aside>

        <!-- ── PANEL FLOTANTE DE OPCIONES DE SEÑALES / SERVIDORES (Inferior Derecha) ── -->
        <div class="tv-signals-panel-float hidden" id="tv-signals-panel">
            <h4><i class="far fa-satellite-dish"></i> Opciones de Señal</h4>
            <div class="tv-signals-buttons-grid" id="tv-signals-list">
                <!-- Se inyectarán los botones dinámicamente -->
            </div>
        </div>

        <!-- ── REPRODUCTOR DE VIDEO AL FONDO (100% de la pantalla) ── -->
        <section class="tv-player-full" id="tv-player-section">
            <div class="player-wrapper" id="player-wrapper">

                <!-- RANURA 1: Principal / Izquierda -->
                <div class="player-slot active-slot" id="player-slot-1">
                    <video id="tv-video-player-1" autoplay crossorigin="anonymous"></video>
                    <iframe id="tv-iframe-player-1" allow="autoplay; encrypted-media; picture-in-picture"
                        allowfullscreen></iframe>
                </div>

                <!-- DIVISOR ARRASTRABLE PARA PANTALLA PARTIDA -->
                <div class="split-resizer focusable" id="split-resizer" tabindex="0" title="Arrastra o usa Flechas Izquierda/Derecha para ajustar tamaño" style="display: none;">
                    <div class="resizer-handle"></div>
                </div>

                <!-- RANURA 2: Secundaria / Derecha (Pantalla Partida) -->
                <div class="player-slot" id="player-slot-2" style="display: none;">
                    <video id="tv-video-player-2" autoplay crossorigin="anonymous"></video>
                    <iframe id="tv-iframe-player-2" allow="autoplay; encrypted-media; picture-in-picture"
                        allowfullscreen></iframe>
                </div>

                <!-- RANURA PiP: Flotante (Esquinas) -->
                <div class="player-slot pip-slot pip-top-left focusable" id="player-slot-pip" tabindex="0"
                    style="display: none;">
                    <video id="tv-video-player-pip" autoplay></video>
                    <iframe id="tv-iframe-player-pip" allow="autoplay; encrypted-media; picture-in-picture"
                        allowfullscreen></iframe>
                    <!-- Barra superior de control y arrastre -->
                    <div class="pip-control-header" id="pip-control-header">
                        <button class="slot-resize-btn focusable" id="btn-resize-slot-pip" tabindex="0"
                            title="Cambiar tamaño de PiP">⤢</button>
                        <button class="slot-drag-btn focusable" id="btn-drag-slot-pip" tabindex="0"
                            title="Arrastrar PiP libremente">✥</button>
                        <button class="slot-position-btn focusable" id="btn-position-slot-pip" tabindex="0"
                            title="Cambiar posición">⤭</button>
                        <button class="slot-close-btn focusable" id="btn-close-slot-pip" tabindex="0"
                            title="Cerrar PiP">×</button>
                    </div>
                </div>

                <!-- Capa protectora para evitar que los iframes capturen eventos durante el arrastre -->
                <div class="iframe-drag-overlay" id="iframe-drag-overlay"></div>

                <!-- Overlay de información del canal reproduciendo -->
                <div class="player-info-overlay" id="player-info">
                    <h2 id="playing-channel-title">Ningún canal seleccionado</h2>
                    <p id="playing-channel-group">Elige una transmisión para comenzar</p>
                </div>

                <!-- Indicador de carga -->
                <div class="player-loader" id="player-loader" style="display: none;">
                    <div class="spinner"></div>
                    <p style="font-size:12px; font-weight:600">Sincronizando señal en vivo...</p>
                </div>
            </div>
        </section>

    </div>

    <!-- Script de lógica de la sección de canales -->
    <script src="canales.js"></script>
</body>

</html>
