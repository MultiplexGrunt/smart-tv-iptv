<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reproductor IPTV optimizado para Smart TV. Navegación fluida mediante control remoto y D-pad.">
    <title>TecnoTV — Smart Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- HLS.js para soportar streams de video .m3u8 en navegadores que no lo soportan de forma nativa -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <div class="tv-app-container">
        
        <!-- ── REPRODUCTOR DE VIDEO (IZQUIERDA - 70% DE LA PANTALLA) ── -->
        <section class="tv-player-section">
            <div class="player-wrapper">
                <!-- Video player HTML5 -->
                <video id="tv-video-player" controls autoplay></video>
                
                <!-- Overlay de información del canal reproduciendo -->
                <div class="player-info-overlay" id="player-info">
                    <h2 id="playing-channel-title">Ningún canal seleccionado</h2>
                    <p id="playing-channel-group">Elige un canal del menú derecho para comenzar a reproducir</p>
                </div>
                
                <!-- Indicador de carga -->
                <div class="player-loader" id="player-loader" style="display: none;">
                    <div class="spinner"></div>
                    <p>Cargando streaming...</p>
                </div>
            </div>
        </section>

        <!-- ── MENÚ LATERAL UNIFICADO (DERECHA - 30% DE LA PANTALLA) ── -->
        <aside class="tv-sidebar">
            <!-- Cabecera de barra lateral -->
            <div class="sidebar-header-row">
                <div class="tv-brand">
                    <span class="brand-glow"></span>
                    <span class="brand-title">TecnoTV</span>
                    <span class="brand-subtitle">Smart Player</span>
                </div>
                <div class="tv-clock" id="system-clock">00:00</div>
            </div>

            <!-- Buscador integrado para navegación D-pad -->
            <div class="search-bar-container">
                <input type="text" id="channel-search" class="focusable search-input" placeholder="🔍 Buscar canal..." tabindex="0">
            </div>

            <!-- ACORDEÓN DE LISTAS M3U -->
            <nav class="tv-accordion" id="tv-accordion">
                <!-- 1. PRINCIPAL -->
                <div class="accordion-group" id="group-principal">
                    <button class="accordion-header focusable" data-section="lista.m3u" id="sec-principal" tabindex="0">
                        <span class="icon">📺</span> PRINCIPAL SSIPTV
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>

                <!-- 2. DEPORTES -->
                <div class="accordion-group" id="group-deportes">
                    <button class="accordion-header focusable" data-section="deportes.m3u" id="sec-deportes" tabindex="0">
                        <span class="icon">🏟️</span> DEPORTES
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>

                <!-- 3. LISTA 1 -->
                <div class="accordion-group" id="group-lista1">
                    <button class="accordion-header focusable" data-section="lista1.m3u" id="sec-lista1" tabindex="0">
                        <span class="icon">⚡</span> LISTA 1
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>

                <!-- 4. LISTA 2 -->
                <div class="accordion-group" id="group-lista2">
                    <button class="accordion-header focusable" data-section="lista2.m3u" id="sec-lista2" tabindex="0">
                        <span class="icon">🔥</span> LISTA 2
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>

                <!-- 5. LISTA 3 -->
                <div class="accordion-group" id="group-lista3">
                    <button class="accordion-header focusable" data-section="lista3.m3u" id="sec-lista3" tabindex="0">
                        <span class="icon">✨</span> LISTA 3
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>

                <!-- 6. LISTA 4 -->
                <div class="accordion-group" id="group-lista4">
                    <button class="accordion-header focusable" data-section="lista4.m3u" id="sec-lista4" tabindex="0">
                        <span class="icon">🌟</span> LISTA 4
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>

                <!-- 7. PELÍCULAS -->
                <div class="accordion-group" id="group-peliculas">
                    <button class="accordion-header focusable" data-section="peliculas.m3u" id="sec-peliculas" tabindex="0">
                        <span class="icon">🎬</span> PELICULAS
                        <span class="chevron">▶</span>
                    </button>
                    <div class="accordion-content">
                        <div class="channels-list"></div>
                    </div>
                </div>
            </nav>

            <!-- CONTROLES COMPACTOS EN PIE DE SIDEMENU -->
            <div class="sidebar-footer">
                <div class="player-controls-guide">
                    <button class="control-btn focusable" id="btn-fullscreen" tabindex="0">
                        📺 Pantalla Completa
                    </button>
                    <button class="control-btn focusable" id="btn-reload-stream" tabindex="0">
                        🔄 Recargar
                    </button>
                    <button class="control-btn focusable" id="btn-toggle-engine" tabindex="0">
                        ⚙️ Modo: HLS (Proxy)
                    </button>
                </div>

                <!-- GUÍA DE CONTROLES AL PIE -->
                <footer class="tv-footer-guide">
                    <div class="guide-item"><span class="key">▲ ▼ ◀ ▶</span> Navegar</div>
                    <div class="guide-item"><span class="key">ENTER</span> Seleccionar</div>
                    <div class="guide-item"><span class="key">BACK</span> Cerrar Menú</div>
                </footer>
            </div>
        </aside>

    </div>

    <!-- Script de lógica de la aplicación -->
    <script src="app.js"></script>
</body>
</html>
